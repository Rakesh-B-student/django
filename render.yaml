services:
  # Web Service
  - type: web
    name: sjbit-elective-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn sjbit_elective.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sjbit-elective-db
          property: connectionString
    
  # PostgreSQL Database
  - type: pserv
    name: sjbit-elective-db
    runtime: postgresql
    plan: free
    databaseName: sjbit_elective_db
    databaseUser: sjbit_user
